  <!-- Donut chart -->
  <g transform="translate(955, 310)">
    <!-- Segment 1: Indigo 40% = 144deg, from -90 to 54 -->
    <path d="M0,-55 A55,55 0 0,1 44.5,-32.3 L29.7,-21.5 A36,36 0 0,0 0,-36 Z" fill="url(#donutIndigo)"/>
    <!-- Segment 2: Cyan 25% = 90deg, from 54 to 144 -->
