    <rect x="355" y="70" width="255" height="95" rx="12" fill="url(#gradCyan)"/>
    <rect x="355" y="70" width="255" height="95" rx="12" fill="#0f172a" fill-opacity="0.7"/>
    <rect x="355" y="70" width="255" height="95" rx="12" fill="none" stroke="#06b6d4" stroke-opacity="0.3" stroke-width="1"/>
    <rect x="355" y="70" width="255" height="3" rx="1.5" fill="#06b6d4" opacity="0.6"/>
    <text x="375" y="100" fill="#94a3b8" font-family="Arial, sans-serif" font-size="12">Total Payments</text>
    <text x="375" y="138" fill="white" font-family="Arial, sans-serif" font-size="28" font-weight="bold">3,542</text>
