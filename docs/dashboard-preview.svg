  <circle cx="10" cy="91.5" r="2.5" fill="rgba(255,255,255,0.15)"/>
  <circle cx="10" cy="111.5" r="2.5" fill="rgba(255,255,255,0.15)"/>
  <circle cx="10" cy="131.5" r="2.5" fill="rgba(255,255,255,0.15)"/>
  <circle cx="10" cy="151.5" r="2.5" fill="rgba(255,255,255,0.15)"/>

  <!-- Top Bar -->
