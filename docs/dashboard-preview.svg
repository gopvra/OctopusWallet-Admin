  <line x1="130" y1="327" x2="780" y2="327" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <line x1="130" y1="367" x2="780" y2="367" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <line x1="130" y1="407" x2="780" y2="407" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

  <!-- Area chart fill -->
  <path d="M130,407 L130,360 L175,340 L220,355 L265,310 L310,295 L355,305 L400,275 L445,260 L490,280 L535,255 L580,240 L625,250 L670,235 L715,248 L760,230 L780,235 L780,407 Z" fill="url(#chartFill)"/>
  <!-- Area chart line -->
