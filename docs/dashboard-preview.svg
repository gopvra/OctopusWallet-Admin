  <line x1="60" y1="50" x2="1200" y2="50" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="85" y="31" fill="white" font-family="Arial, sans-serif" font-size="16" font-weight="bold">Octopus Admin</text>
  <!-- Top bar right items -->
