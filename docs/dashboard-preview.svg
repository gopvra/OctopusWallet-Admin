    <rect x="82" y="70" width="255" height="95" rx="12" fill="#0f172a" fill-opacity="0.7"/>
    <rect x="82" y="70" width="255" height="95" rx="12" fill="none" stroke="#6366f1" stroke-opacity="0.3" stroke-width="1"/>
