  <text x="115" y="549" fill="#6366f1" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" font-weight="bold">AC</text>
  <text x="135" y="549" fill="white" font-family="Arial, sans-serif" font-size="12">Acme Corp</text>
  <text x="340" y="549" fill="#94a3b8" font-family="Arial, sans-serif" font-size="12">Payment</text>
  <text x="530" y="549" fill="white" font-family="Arial, sans-serif" font-size="12" font-weight="bold">$12,450.00</text>
  <rect x="720" y="535" width="72" height="22" rx="11" fill="#10b981" fill-opacity="0.15"/>
  <text x="756" y="550" fill="#10b981" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">Completed</text>
  <text x="920" y="549" fill="#64748b" font-family="Arial, sans-serif" font-size="12">Apr 7, 2026</text>
  <line x1="102" y1="565" x2="1151" y2="565" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

  <!-- Row 2 -->
  <circle cx="115" cy="590" r="12" fill="#1e293b"/>
  <text x="115" y="594" fill="#06b6d4" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" font-weight="bold">GL</text>
  <text x="135" y="594" fill="white" font-family="Arial, sans-serif" font-size="12">Globex Inc</text>
  <text x="340" y="594" fill="#94a3b8" font-family="Arial, sans-serif" font-size="12">Payout</text>
  <text x="530" y="594" fill="white" font-family="Arial, sans-serif" font-size="12" font-weight="bold">$8,200.00</text>
  <rect x="720" y="580" width="72" height="22" rx="11" fill="#eab308" fill-opacity="0.15"/>
  <text x="756" y="595" fill="#eab308" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">Pending</text>
  <text x="920" y="594" fill="#64748b" font-family="Arial, sans-serif" font-size="12">Apr 7, 2026</text>
  <line x1="102" y1="610" x2="1151" y2="610" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

  <!-- Row 3 -->
  <circle cx="115" cy="635" r="12" fill="#1e293b"/>
  <text x="115" y="639" fill="#a855f7" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" font-weight="bold">WY</text>
  <text x="135" y="639" fill="white" font-family="Arial, sans-serif" font-size="12">Wayne Enterprises</text>
  <text x="340" y="639" fill="#94a3b8" font-family="Arial, sans-serif" font-size="12">Payment</text>
  <text x="530" y="639" fill="white" font-family="Arial, sans-serif" font-size="12" font-weight="bold">$24,800.00</text>
  <rect x="720" y="625" width="72" height="22" rx="11" fill="#10b981" fill-opacity="0.15"/>
  <text x="756" y="640" fill="#10b981" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">Completed</text>
  <text x="920" y="639" fill="#64748b" font-family="Arial, sans-serif" font-size="12">Apr 6, 2026</text>
  <line x1="102" y1="655" x2="1151" y2="655" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

  <!-- Row 4 -->
  <circle cx="115" cy="672" r="12" fill="#1e293b"/>
  <text x="115" y="676" fill="#10b981" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" font-weight="bold">ST</text>
  <text x="135" y="676" fill="white" font-family="Arial, sans-serif" font-size="12">Stark Industries</text>
