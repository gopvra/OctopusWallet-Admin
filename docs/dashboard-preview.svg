  <text x="1140" y="30" fill="#94a3b8" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">A</text>
  <circle cx="1100" cy="25" r="3" fill="#10b981"/>
  <rect x="1050" y="18" width="30" height="14" rx="4" fill="#1e293b"/>
  <text x="1065" y="28" fill="#94a3b8" font-family="Arial, sans-serif" font-size="8" text-anchor="middle">EN</text>

