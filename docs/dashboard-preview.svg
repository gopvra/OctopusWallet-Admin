  <rect x="18" y="90" width="24" height="3" rx="1.5" fill="rgba(255,255,255,0.3)"/>
  <rect x="18" y="110" width="24" height="3" rx="1.5" fill="rgba(255,255,255,0.3)"/>
  <rect x="18" y="130" width="24" height="3" rx="1.5" fill="rgba(255,255,255,0.3)"/>
