  <text x="756" y="677" fill="#ef4444" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">Failed</text>
  <text x="920" y="676" fill="#64748b" font-family="Arial, sans-serif" font-size="12">Apr 5, 2026</text>
</svg>