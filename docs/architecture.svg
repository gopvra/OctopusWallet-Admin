<svg xmlns="http://www.w3.org/2000/svg" width="900" height="500" viewBox="0 0 900 500">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
    <!-- Backend gradient (dark indigo) -->
    <linearGradient id="backendGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3730a3"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <!-- Admin Frontend gradient (teal/cyan) -->
    <linearGradient id="adminGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d9488"/>
      <stop offset="100%" stop-color="#134e4a"/>
    </linearGradient>
    <!-- Merchant Frontend gradient (purple) -->
    <linearGradient id="merchantGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </linearGradient>
    <!-- Database gradient (green) -->
    <linearGradient id="dbGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#16a34a"/>
      <stop offset="100%" stop-color="#14532d"/>
    </linearGradient>
    <!-- Blockchain gradient (orange) -->
    <linearGradient id="chainGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ea580c"/>
      <stop offset="100%" stop-color="#7c2d12"/>
    </linearGradient>
    <!-- Glow filters -->
    <filter id="glowIndigo" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.22  0 0 0 0 0.19  0 0 0 0 0.64  0 0 0 0.35 0"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowTeal" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.05  0 0 0 0 0.58  0 0 0 0 0.53  0 0 0 0.3 0"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowPurple" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.49  0 0 0 0 0.23  0 0 0 0 0.93  0 0 0 0.3 0"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Arrow marker -->
    <marker id="arrowWhite" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#94a3b8" stroke-width="1.2"/>
    </marker>
    <marker id="arrowTeal" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#2dd4bf" stroke-width="1.2"/>
    </marker>
    <marker id="arrowPurple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#a78bfa" stroke-width="1.2"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#4ade80" stroke-width="1.2"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#fb923c" stroke-width="1.2"/>
    </marker>
    <!-- Subtle grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.4"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="900" height="500" fill="url(#bgGrad)"/>
  <rect width="900" height="500" fill="url(#grid)" opacity="0.3"/>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="18" font-weight="600" fill="#e2e8f0" letter-spacing="1.5">OCTOPUSWALLET ARCHITECTURE</text>
  <line x1="310" y1="46" x2="590" y2="46" stroke="#334155" stroke-width="1"/>

  <!-- ======================== -->
  <!-- CONNECTION LINES (drawn first, behind boxes) -->
  <!-- ======================== -->

  <!-- Admin Frontend -> Backend (Admin API) -->
  <line x1="218" y1="200" x2="348" y2="200" stroke="#2dd4bf" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrowTeal)"/>
  <rect x="240" y="185" width="70" height="18" rx="4" fill="#020617" stroke="#2dd4bf" stroke-width="0.6" opacity="0.9"/>
  <text x="275" y="197" text-anchor="middle" font-family="Segoe UI, monospace" font-size="9" fill="#2dd4bf">Admin API</text>

  <!-- Merchant Frontend -> Backend (Merchant API) -->
  <line x1="218" y1="340" x2="348" y2="275" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrowPurple)"/>
  <rect x="240" y="293" width="86" height="18" rx="4" fill="#020617" stroke="#a78bfa" stroke-width="0.6" opacity="0.9"/>
  <text x="283" y="305" text-anchor="middle" font-family="Segoe UI, monospace" font-size="9" fill="#a78bfa">Merchant API</text>

  <!-- WebSocket line (Merchant <-> Backend) -->
  <path d="M218,360 Q310,390 420,285" fill="none" stroke="#c084fc" stroke-width="1.2" stroke-dasharray="3,4" marker-end="url(#arrowPurple)" opacity="0.7"/>
  <rect x="280" y="365" width="72" height="18" rx="4" fill="#020617" stroke="#c084fc" stroke-width="0.6" opacity="0.9"/>
  <text x="316" y="377" text-anchor="middle" font-family="Segoe UI, monospace" font-size="9" fill="#c084fc">WebSocket</text>

  <!-- Backend -> PostgreSQL -->
  <line x1="450" y1="290" x2="450" y2="378" stroke="#4ade80" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrowGreen)"/>

  <!-- Backend -> Blockchain Networks -->
  <line x1="555" y1="220" x2="648" y2="160" stroke="#fb923c" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrowOrange)"/>
  <line x1="555" y1="240" x2="648" y2="230" stroke="#fb923c" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrowOrange)"/>
  <line x1="555" y1="260" x2="648" y2="300" stroke="#fb923c" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrowOrange)"/>
  <line x1="555" y1="270" x2="648" y2="370" stroke="#fb923c" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrowOrange)"/>

  <!-- ======================== -->
  <!-- COMPONENT BOXES -->
  <!-- ======================== -->

  <!-- Backend: OctopusWallet Backend (Go + Gin) — center -->
  <g filter="url(#glowIndigo)">
    <rect x="350" y="175" width="200" height="115" rx="12" fill="url(#backendGrad)" stroke="#6366f1" stroke-width="1.2"/>
  </g>
  <!-- Octopus icon (simple) -->
  <circle cx="450" cy="210" r="14" fill="none" stroke="#a5b4fc" stroke-width="1.2" opacity="0.7"/>
  <circle cx="446" cy="207" r="2" fill="#a5b4fc" opacity="0.7"/>
  <circle cx="454" cy="207" r="2" fill="#a5b4fc" opacity="0.7"/>
  <path d="M436,216 Q432,230 428,226" fill="none" stroke="#a5b4fc" stroke-width="1" opacity="0.5"/>
  <path d="M440,220 Q438,234 434,230" fill="none" stroke="#a5b4fc" stroke-width="1" opacity="0.5"/>
  <path d="M460,220 Q462,234 466,230" fill="none" stroke="#a5b4fc" stroke-width="1" opacity="0.5"/>
  <path d="M464,216 Q468,230 472,226" fill="none" stroke="#a5b4fc" stroke-width="1" opacity="0.5"/>
  <text x="450" y="248" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" font-weight="600" fill="#e2e8f0">OctopusWallet</text>
  <text x="450" y="265" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" font-weight="600" fill="#e2e8f0">Backend</text>
  <text x="450" y="281" text-anchor="middle" font-family="Segoe UI, monospace" font-size="10" fill="#a5b4fc">Go + Gin</text>

  <!-- Admin Frontend (React) — top left -->
  <g filter="url(#glowTeal)">
    <rect x="48" y="160" width="170" height="80" rx="10" fill="url(#adminGrad)" stroke="#2dd4bf" stroke-width="1"/>
  </g>
  <text x="133" y="196" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" font-weight="600" fill="#e2e8f0">Admin Frontend</text>
  <text x="133" y="215" text-anchor="middle" font-family="Segoe UI, monospace" font-size="10" fill="#99f6e4">React + TypeScript</text>
  <text x="133" y="230" text-anchor="middle" font-family="Segoe UI, monospace" font-size="9" fill="#5eead4">Tailwind + shadcn/ui</text>

  <!-- Merchant Frontend (React) — bottom left -->
  <g filter="url(#glowPurple)">
    <rect x="48" y="300" width="170" height="80" rx="10" fill="url(#merchantGrad)" stroke="#a78bfa" stroke-width="1"/>
  </g>
  <text x="133" y="336" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" font-weight="600" fill="#e2e8f0">Merchant Frontend</text>
  <text x="133" y="355" text-anchor="middle" font-family="Segoe UI, monospace" font-size="10" fill="#ddd6fe">React + TypeScript</text>
  <text x="133" y="370" text-anchor="middle" font-family="Segoe UI, monospace" font-size="9" fill="#c4b5fd">Real-time Dashboard</text>

  <!-- PostgreSQL — bottom center -->
  <g>
    <rect x="380" y="385" width="140" height="70" rx="10" fill="url(#dbGrad)" stroke="#4ade80" stroke-width="1"/>
    <!-- DB cylinder icon -->
    <ellipse cx="450" cy="408" rx="16" ry="6" fill="none" stroke="#bbf7d0" stroke-width="1" opacity="0.7"/>
    <line x1="434" y1="408" x2="434" y2="420" stroke="#bbf7d0" stroke-width="1" opacity="0.7"/>
    <line x1="466" y1="408" x2="466" y2="420" stroke="#bbf7d0" stroke-width="1" opacity="0.7"/>
    <ellipse cx="450" cy="420" rx="16" ry="6" fill="none" stroke="#bbf7d0" stroke-width="1" opacity="0.7"/>
  </g>
  <text x="450" y="442" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" font-weight="600" fill="#e2e8f0">PostgreSQL</text>

  <!-- ======================== -->
  <!-- BLOCKCHAIN NETWORKS — right side -->
  <!-- ======================== -->

  <!-- Bitcoin -->
  <rect x="650" y="138" width="130" height="34" rx="8" fill="url(#chainGrad)" stroke="#f97316" stroke-width="0.8"/>
  <circle cx="670" cy="155" r="9" fill="none" stroke="#fde68a" stroke-width="1.2"/>
  <text x="670" y="159" text-anchor="middle" font-family="Segoe UI, serif" font-size="11" font-weight="700" fill="#fde68a">B</text>
  <text x="720" y="160" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" font-weight="600" fill="#fed7aa">Bitcoin</text>

  <!-- Ethereum -->
  <rect x="650" y="208" width="130" height="34" rx="8" fill="url(#chainGrad)" stroke="#f97316" stroke-width="0.8"/>
  <path d="M670,218 L678,228 L670,225 L662,228 Z" fill="none" stroke="#a5b4fc" stroke-width="1"/>
  <path d="M670,225 L678,228 L670,238 L662,228 Z" fill="none" stroke="#a5b4fc" stroke-width="1"/>
  <text x="720" y="230" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" font-weight="600" fill="#fed7aa">Ethereum</text>

  <!-- Tron -->
  <rect x="650" y="278" width="130" height="34" rx="8" fill="url(#chainGrad)" stroke="#f97316" stroke-width="0.8"/>
  <path d="M662,290 L678,290 L670,304 Z" fill="none" stroke="#f87171" stroke-width="1.2"/>
  <text x="720" y="300" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" font-weight="600" fill="#fed7aa">Tron</text>

  <!-- Solana -->
  <rect x="650" y="348" width="130" height="34" rx="8" fill="url(#chainGrad)" stroke="#f97316" stroke-width="0.8"/>
  <line x1="660" y1="360" x2="680" y2="360" stroke="#a78bfa" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="660" y1="365" x2="680" y2="365" stroke="#67e8f9" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="660" y1="370" x2="680" y2="370" stroke="#34d399" stroke-width="1.5" stroke-linecap="round"/>
  <text x="720" y="370" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" font-weight="600" fill="#fed7aa">Solana</text>

  <!-- Blockchain group label -->
  <text x="715" y="128" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" font-weight="600" fill="#94a3b8" letter-spacing="1">BLOCKCHAIN NETWORKS</text>

  <!-- Legend / footer -->
  <line x1="80" y1="472" x2="100" y2="472" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="6,3"/>
  <text x="108" y="476" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#64748b">REST API</text>
  <line x1="180" y1="472" x2="200" y2="472" stroke="#c084fc" stroke-width="1.2" stroke-dasharray="3,4"/>
  <text x="208" y="476" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="9" fill="#64748b">WebSocket</text>

  <text x="450" y="494" text-anchor="middle" font-family="Segoe UI, monospace" font-size="8" fill="#334155">OctopusWallet Admin System v1.0</text>
</svg>
